<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>系統維護中｜校園自治整合平台</title>
    <style>
      :root {
        color-scheme: dark;
        --night: #0b1220;
        --navy: #101c31;
        --ink: #f5f1e7;
        --muted: #aeb8c8;
        --quiet: #71809a;
        --line: rgba(211, 190, 123, 0.24);
        --gold: #e8c970;
        --gold-deep: #b99b46;
        --blue: #8eb4df;
      }

      * { box-sizing: border-box; }

      html { min-height: 100%; }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(60rem 42rem at 82% 8%, rgba(49, 88, 135, 0.24), transparent 64%),
          radial-gradient(42rem 30rem at 6% 92%, rgba(183, 142, 57, 0.1), transparent 68%),
          var(--night);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Noto Sans TC", sans-serif;
        line-height: 1.7;
      }

      .page-shell {
        width: min(100% - 40px, 1180px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 32px 0 24px;
        display: flex;
        flex-direction: column;
      }

      header,
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header { padding-bottom: 28px; }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid rgba(232, 201, 112, 0.72);
        border-radius: 50%;
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.18rem;
        font-weight: 700;
      }

      .brand-name,
      .brand-subtitle {
        display: block;
      }

      .brand-name {
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 750;
        letter-spacing: 0.08em;
      }

      .brand-subtitle {
        margin-top: 1px;
        color: var(--quiet);
        font-size: 0.68rem;
        letter-spacing: 0.04em;
      }

      .header-label {
        color: var(--quiet);
        font-size: 0.68rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
        align-items: center;
        gap: clamp(48px, 9vw, 132px);
        padding: clamp(48px, 10vh, 120px) 0;
      }

      .status-line {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 28px;
        color: var(--gold);
        font-size: 0.73rem;
        font-weight: 750;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 0 5px rgba(232, 201, 112, 0.12);
      }

      h1 {
        max-width: 760px;
        margin: 0;
        color: var(--ink);
        font-size: clamp(2.8rem, 7vw, 6rem);
        font-weight: 650;
        letter-spacing: -0.035em;
        line-height: 1.04;
        text-wrap: balance;
      }

      h1 strong {
        color: var(--gold);
        font-weight: 650;
      }

      .lead {
        max-width: 590px;
        margin: 30px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.18rem);
        line-height: 1.9;
        text-wrap: pretty;
      }

      .gold-rule {
        width: min(100%, 620px);
        height: 1px;
        margin-top: 44px;
        background: linear-gradient(90deg, var(--gold), rgba(232, 201, 112, 0.08));
      }

      .status-panel {
        margin-top: 22px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(16, 28, 49, 0.62);
      }

      .status-panel strong,
      .status-panel span {
        display: block;
      }

      .status-panel strong {
        color: var(--ink);
        font-size: 0.95rem;
      }

      .status-panel span {
        margin-top: 4px;
        color: var(--quiet);
        font-size: 0.82rem;
      }

      .status-panel p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      aside {
        padding: 26px 0 26px 28px;
        border-left: 1px solid var(--line);
      }

      aside::before {
        content: "";
        display: block;
        width: 34px;
        height: 3px;
        margin-bottom: 24px;
        background: var(--gold);
      }

      .aside-label {
        margin: 0;
        color: var(--blue);
        font-size: 0.72rem;
        font-weight: 750;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      aside h2 {
        max-width: 300px;
        margin: 16px 0 14px;
        color: var(--ink);
        font-size: clamp(1.35rem, 2.5vw, 1.8rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.3;
        text-wrap: balance;
      }

      aside p {
        max-width: 330px;
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      footer {
        padding-top: 24px;
        border-top: 1px solid rgba(174, 184, 200, 0.14);
        color: var(--quiet);
        font-size: 0.72rem;
      }

      footer span { color: var(--gold-deep); }

      @media (max-width: 720px) {
        .page-shell {
          width: min(100% - 32px, 560px);
          padding-top: 22px;
        }

        .header-label { display: none; }

        main {
          display: block;
          padding: 72px 0 64px;
        }

        h1 { font-size: clamp(2.7rem, 14vw, 4.5rem); }

        aside {
          margin-top: 56px;
          padding: 24px 0 0;
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        footer { align-items: flex-start; gap: 16px; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <div class="brand" aria-label="校園自治整合平台">
          <span class="brand-mark" aria-hidden="true">H</span>
          <span>
            <span class="brand-name">HCCA</span>
            <span class="brand-subtitle">Campus Self-Governance Platform</span>
          </span>
        </div>
        <span class="header-label">System status</span>
      </header>

      <main>
        <section aria-labelledby="maintenance-title" aria-live="polite">
          <p class="status-line"><span class="status-dot" aria-hidden="true"></span>系統維護中</p>
          <h1 id="maintenance-title">我們正在讓平台<br><strong>準備得更好。</strong></h1>
          <p class="lead">校園自治整合平台正在進行版本更新。完成後服務會自動恢復，請稍後再回來。</p>
          <div class="gold-rule" aria-hidden="true"></div>
          <div class="status-panel" role="status">
            <strong>目前暫停服務</strong>
            <span>MAINTENANCE IN PROGRESS</span>
            <p>資料與已完成的作業都受到保護，不會因本次維護遺失。</p>
          </div>
        </section>

        <aside aria-label="維護說明">
          <p class="aside-label">Governance platform</p>
          <h2>把時間留給更重要的自治工作。</h2>
          <p>我們正在完成必要的系統整理，讓下一次使用更加穩定。謝謝你的耐心等候。</p>
        </aside>
      </main>

      <footer>
        <span>校園自治整合平台</span>
        <span>HCCA · Campus Self-Governance</span>
      </footer>
    </div>
  </body>
</html>
