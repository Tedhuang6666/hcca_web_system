# Prometheus 設定 — 對應 Phase A2 可觀測性
# 抓取目標：
#   - api / api-green / api-admin 三個 FastAPI 副本（/metrics）
#   - PgBouncer、Redis（透過 exporter）
#   - 自己（self-monitoring）

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: hcca-prod
    environment: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          replica: primary

  - job_name: celery
    static_configs:
      - targets: ["celery-worker:9101"]
        labels:
          worker: default
      - targets: ["email-worker:9101"]
        labels:
          worker: email

  # 若有 redis_exporter / postgres_exporter（建議 Phase A2 結束時補）
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

rule_files:
  - /etc/prometheus/rules/*.yml

