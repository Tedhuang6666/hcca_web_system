# Production compose file.
# Run with:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

# 所有容器共用的 log rotation（防 log 無限長大塞爆磁碟）；與主機 daemon.json 雙保險。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# 非同步 DB 連線位址：預設直連 db:5432；要啟用 PgBouncer（Phase D）時，
# 在 .env.production 設 DB_HOST=pgbouncer DB_PORT=6432 DB_USE_PGBOUNCER=true 即可，
# 不需改本檔。⚠️ DATABASE_URL_SYNC（Alembic / 同步）永遠直連 db:5432，繞過 PgBouncer。

x-api-common: &api-common
  logging: *default-logging
  build:
    context: .
    dockerfile: apps/api/Dockerfile
    args:
      APP_VERSION: ${APP_VERSION:-01.00.00.00.00}
      BUILD_COMMIT: ${BUILD_COMMIT:-}
      BUILD_REF: ${BUILD_REF:-}
      BUILD_TIME: ${BUILD_TIME:-}
  env_file:
    - ${PROD_ENV_FILE:-.env.production}
  environment:
    ENVIRONMENT: production
    DEBUG: "false"
    ENABLE_API_DOCS: "false"
    COOKIE_SECURE: "true"
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:?set POSTGRES_DB}
    DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
    DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
    DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
    DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
    DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
    REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - uploads:/app/uploads
    - backups:/app/backups

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: ${DB_MEM_LIMIT:-768m}
    mem_reservation: 256m
    cpus: ${DB_CPUS:-1.5}
    logging: *default-logging
    labels:
      autoheal: "true"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c log_min_duration_statement=1000
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    mem_reservation: 96m
    cpus: ${REDIS_CPUS:-0.5}
    logging: *default-logging
    labels:
      autoheal: "true"
    # noeviction（Redis 預設）：broker 任務絕不可被 evict 掉；queue-routing 修正後
    # 佇列不再無限成長，mem_limit 僅作 backstop。
    # maxmemory 設為 mem_limit 的 80%（200mb），讓 Redis 主動拋 OOM 而非等 Docker 強殺。
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 200mb --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # migrate 改放 "migrate" profile：預設 up 不會啟動，避免每次重啟 worker/api 或
  # autoheal 拉起容器時都重跑一次 migration。部署有新 schema 時手動跑一次：
  #   docker compose --env-file .env.production -f docker-compose.prod.yml --profile migrate run --rm migrate
  migrate:
    <<: *api-common
    restart: "no"
    profiles: ["migrate"]
    command: python -m alembic -c /app/alembic.ini upgrade head

  api:
    <<: *api-common
    restart: unless-stopped
    mem_limit: ${API_MEM_LIMIT:-1024m}
    mem_reservation: 512m
    cpus: ${API_CPUS:-2}
    labels:
      autoheal: "true"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      # 拉長至 90s：給 lifespan 啟動 readiness 退避重試空間，避免重試期間被判 unhealthy
      start_period: 90s

  celery-worker:
    <<: *api-common
    restart: unless-stopped
    profiles: ["workers"]
    # 記憶體護欄：容器吃到 mem_limit 就只 OOM-kill 自己（不再拖垮全機）；
    # memswap_limit 設成與 mem_limit 相等 = 禁用 swap，失控時快速失敗而非吃光
    # 5GB swap 把整台機器拖到龜速。可用 CELERY_WORKER_MEM_LIMIT 覆寫。
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-1200m}
    memswap_limit: ${CELERY_WORKER_MEM_LIMIT:-1200m}
    mem_reservation: 256m
    cpus: ${CELERY_WORKER_CPUS:-1.5}
    # 不掛 autoheal：healthcheck 已停用（見下），autoheal 只重啟 unhealthy 容器，
    # 對無 healthcheck 的服務無作用，留著只會誤導。存活交給 restart: unless-stopped。
    # worker pool 用 solo：prefork(billiard) 在此環境會多行程失控吃滿 CPU
    # （concurrency=1 仍飆到 600%+）。solo 在主行程內單工執行，正式站小流量最穩。
    # 注意：solo 無子行程，故不用 --max-tasks-per-child（prefork 專屬，solo 會忽略）；
    # 記憶體改由上方 mem_limit 守。prefetch=1 避免一次抓多筆訊息卡在主迴圈。
    command: >
      python -m celery -A api.core.celery_app.celery_app worker
      --loglevel=info
      --pool=solo
      --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
      --prefetch-multiplier=1
      --queues=default,email,meal,documents,backup,recovery
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${CELERY_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${CELERY_DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
      PROMETHEUS_METRICS_PORT: "9101"
    # file-based heartbeat：beat 每 60s 寫 /tmp/celery-heartbeat；healthcheck 檢查檔案
    # 存在且不超過 180s，避免 inspect ping 帶起重量級 Python 行程的舊問題。
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celery-heartbeat && [ $(( $(date +%s) - $(cat /tmp/celery-heartbeat | cut -d. -f1) )) -lt 180 ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

  # 寄信專責 worker：只吃 email queue、concurrency=1，與背景任務隔離。
  # 獨立 "email" profile：需要寄信時才開（建議常駐）
  #   docker compose --env-file .env.production -f docker-compose.prod.yml --profile email up -d email-worker
  email-worker:
    <<: *api-common
    restart: unless-stopped
    profiles: ["email"]
    mem_limit: ${EMAIL_WORKER_MEM_LIMIT:-512m}
    memswap_limit: ${EMAIL_WORKER_MEM_LIMIT:-512m}
    mem_reservation: 128m
    cpus: ${EMAIL_WORKER_CPUS:-0.75}
    # 不掛 autoheal：healthcheck 已停用（見下），autoheal 對無 healthcheck 的服務無作用。
    command: >
      python -m celery -A api.core.celery_app.celery_app worker
      --loglevel=info
      --concurrency=${EMAIL_WORKER_CONCURRENCY:-1}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-200}
      --queues=email
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${EMAIL_WORKER_DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${EMAIL_WORKER_DB_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
      PROMETHEUS_METRICS_PORT: "9101"
    # 同 worker：不設 healthcheck，避免 Docker 判 unhealthy 自動重啟把忙碌 worker 打掉。
    healthcheck:
      disable: true

  celery-beat:
    <<: *api-common
    restart: unless-stopped
    profiles: ["workers"]
    # beat 只排程、不執行任務，記憶體很小；給個硬上限防意外洩漏。
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-256m}
    memswap_limit: ${CELERY_BEAT_MEM_LIMIT:-256m}
    mem_reservation: 48m
    cpus: ${CELERY_BEAT_CPUS:-0.25}
    # 不掛 autoheal：healthcheck 已停用（見下），autoheal 對無 healthcheck 的服務無作用。
    # 根因：beat 以 PID 1 執行（exec），pidfile 會寫入「1」；若 pidfile 放在
    # 持久化的 celerybeat volume（/tmp），重啟後 celery 讀到舊 pidfile「1」，
    # 而每個容器都有 PID 1 → 判定「已在執行」而中止 → restart/autoheal 反覆
    # 拉起形成 CPU 爆掉的重啟迴圈（ERROR: Pidfile already exists ... pid: 1）。
    # 修法：pidfile 改放非持久化的 /dev/shm（每次啟動皆乾淨），schedule 仍持久化
    # 於 /tmp；啟動先 rm 掉新舊兩處殘留 pidfile 作保險。exec 讓 celery 接手 PID 1。
    command:
      - sh
      - -c
      - >
        rm -f /dev/shm/celerybeat.pid /tmp/celerybeat.pid &&
        exec python -m celery -A api.core.celery_app.celery_app beat
        --loglevel=INFO
        --scheduler celery.beat:PersistentScheduler
        --schedule=/tmp/celerybeat-schedule
        --pidfile=/dev/shm/celerybeat.pid
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${CELERY_BEAT_DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${CELERY_BEAT_DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
    volumes:
      - uploads:/app/uploads
      - celerybeat:/tmp
    # beat 不設 healthcheck：pidfile 存在不代表排程仍在運作，且判 unhealthy 自動重啟
    # 反而易與 PID 1 殘留 pidfile 互相作用觸發重啟迴圈。存活交給 restart: unless-stopped。
    healthcheck:
      disable: true

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://hcca40.hct.works}
        NEXT_PUBLIC_BUILD_COMMIT: ${BUILD_COMMIT:-}
        NEXT_PUBLIC_BUILD_REF: ${BUILD_REF:-}
        NEXT_PUBLIC_BUILD_TIME: ${BUILD_TIME:-}
    restart: unless-stopped
    mem_limit: ${WEB_MEM_LIMIT:-512m}
    mem_reservation: 192m
    cpus: ${WEB_CPUS:-1}
    logging: *default-logging
    labels:
      autoheal: "true"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://hcca40.hct.works}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: ${PROXY_MEM_LIMIT:-128m}
    mem_reservation: 32m
    cpus: ${PROXY_CPUS:-0.5}
    logging: *default-logging
    labels:
      autoheal: "true"
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    # 健康檢查打 Caddy 本機 admin API（不依賴 TLS / 80→443 轉址）
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── 智慧自動重啟 ──────────────────────────────────────────────────────────
  # 監看所有帶 label autoheal=true 的容器，healthcheck 變 unhealthy 就自動重啟它。
  # 補足 Docker 原生 restart policy 只在 process exit 時才重啟的缺口。
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    mem_limit: ${AUTOHEAL_MEM_LIMIT:-32m}
    cpus: 0.1
    logging: *default-logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"        # 每 10 秒檢查一次
      AUTOHEAL_START_PERIOD: "60"    # 容器啟動後 60 秒才開始監看
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "20"
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      # 需可寫才能呼叫 docker restart；屬受信任本機運維元件。
      - /var/run/docker.sock:/var/run/docker.sock

  # ── PgBouncer 連線池（Phase D，預設不啟用）────────────────────────────────
  # 啟用方式：在 .env.production 設 DB_HOST=pgbouncer DB_PORT=6432 DB_USE_PGBOUNCER=true
  # 後重啟。⚠️ 上線前務必照計畫 Phase D 驗證 auth 與 migration（migration 仍直連 db）。
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    mem_limit: ${PGBOUNCER_MEM_LIMIT:-64m}
    mem_reservation: 16m
    cpus: ${PGBOUNCER_CPUS:-0.25}
    logging: *default-logging
    labels:
      autoheal: "true"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:?set POSTGRES_DB}
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      # transaction 模式下每筆交易結束清狀態；配合 app 端關 prepared statement cache。
      SERVER_RESET_QUERY: DISCARD ALL
      # asyncpg 會送 extra_float_digits 等啟動參數，PgBouncer 需放行避免報錯。
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    profiles: ["monitoring"]
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheusdata:/prometheus
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    profiles: ["monitoring"]
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    profiles: ["monitoring"]
    mem_limit: 64m
    mem_reservation: 16m
    logging: *default-logging
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    profiles: ["monitoring"]
    mem_limit: 64m
    mem_reservation: 16m
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:v1.14.0
    restart: unless-stopped
    profiles: ["search"]
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.5
    logging: *default-logging
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearchdata:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health | grep -q '\"status\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
  redisdata:
  uploads:
  backups:
  celerybeat:
  caddydata:
  caddyconfig:
  prometheusdata:
  grafanadata:
  meilisearchdata:
