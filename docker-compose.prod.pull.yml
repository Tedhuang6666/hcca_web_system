# Production compose file that pulls prebuilt images from GHCR.
# Run with:
#   docker compose --env-file .env.production -f docker-compose.prod.pull.yml pull
#   docker compose --env-file .env.production -f docker-compose.prod.pull.yml up -d db redis api web proxy
#
# 穩定核心：db / redis / api / web / proxy（上面那行）。
# celery-worker / celery-beat 已歸到 "workers" profile，預設不啟動，
# 連 `up -d`（不指定服務）也不會把它們拉起來。確定要常駐 Celery 時才加：
#   docker compose --env-file .env.production -f docker-compose.prod.pull.yml --profile workers up -d

x-api-common: &api-common
  image: ghcr.io/tedhuang6666/hcca_web_system-api:latest
  env_file:
    - ${PROD_ENV_FILE:-.env.production}
  environment:
    ENVIRONMENT: production
    DEBUG: "false"
    ENABLE_API_DOCS: "false"
    COOKIE_SECURE: "true"
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
    DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
    DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
    DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
    DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
    DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
    HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
    REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - uploads:/app/uploads
    - backups:/app/backups

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # migrate 改放 "migrate" profile：預設 up 不會啟動，避免每次重啟 worker/api 或
  # autoheal 拉起容器時都重跑一次 migration。部署有新 schema 時手動跑一次：
  #   docker compose --env-file .env.production -f docker-compose.prod.pull.yml --profile migrate run --rm migrate
  migrate:
    <<: *api-common
    restart: "no"
    profiles: ["migrate"]
    command: python -m alembic -c /app/alembic.ini upgrade head

  api:
    <<: *api-common
    restart: unless-stopped
    # 記憶體護欄：吃到上限只 OOM-kill 自己，不再靠 swap 拖垮整台（memswap=mem 即禁用 swap）。
    mem_limit: ${API_MEM_LIMIT:-1200m}
    memswap_limit: ${API_MEM_LIMIT:-1200m}
    mem_reservation: 256m
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # 一般背景任務 worker：不吃 email queue（寄信交給專責的 email-worker，
  # 避免大量背景任務把寄信卡住）。
  celery-worker:
    <<: *api-common
    restart: unless-stopped
    profiles: ["workers"]
    # 記憶體護欄：吃到上限只 OOM-kill 自己，不再靠 swap 拖垮整台（memswap=mem 即禁用 swap）。
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-1200m}
    memswap_limit: ${CELERY_WORKER_MEM_LIMIT:-1200m}
    mem_reservation: 256m
    # worker pool 用 solo：prefork(billiard) 在此環境會多行程失控吃滿 CPU
    # （concurrency=1 仍飆到 600%+）。solo 在主行程內單工執行，正式站小流量最穩。
    # 注意：solo 無子行程，故不用 --max-tasks-per-child（prefork 專屬，solo 會忽略）；
    # 記憶體改由上方 mem_limit 守。prefetch=1 避免一次抓多筆訊息卡在主迴圈。
    command: >
      python -m celery -A api.core.celery_app.celery_app worker
      --loglevel=info
      --pool=solo
      --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
      --prefetch-multiplier=1
      --queues=default,email,meal,documents,backup,recovery
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${CELERY_DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${CELERY_DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m celery -A api.core.celery_app.celery_app inspect ping -d celery@$$HOSTNAME -t 5 >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      # solo pool 跑長任務（backup/recovery）時主迴圈被佔住、無法回應 ping，
      # 放寬 retries/start_period 避免備份途中被 autoheal 誤殺重啟。
      retries: 6
      start_period: 60s

  # 寄信專責 worker：只吃 email queue、concurrency=1，與背景任務隔離。
  # 獨立 "email" profile：需要寄信時才開
  #   docker compose --env-file .env.production -f docker-compose.prod.pull.yml --profile email up -d email-worker
  email-worker:
    <<: *api-common
    restart: unless-stopped
    profiles: ["email"]
    mem_limit: ${EMAIL_WORKER_MEM_LIMIT:-512m}
    memswap_limit: ${EMAIL_WORKER_MEM_LIMIT:-512m}
    mem_reservation: 128m
    command: >
      python -m celery -A api.core.celery_app.celery_app worker
      --loglevel=info
      --concurrency=${EMAIL_WORKER_CONCURRENCY:-1}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-200}
      --queues=email
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${EMAIL_WORKER_DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${EMAIL_WORKER_DB_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -m celery -A api.core.celery_app.celery_app inspect ping -d celery@$$HOSTNAME -t 5 >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-beat:
    <<: *api-common
    restart: unless-stopped
    profiles: ["workers"]
    # beat 只排程、不執行任務，記憶體很小；給個硬上限防意外洩漏（memswap=mem 即禁用 swap）。
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-256m}
    memswap_limit: ${CELERY_BEAT_MEM_LIMIT:-256m}
    mem_reservation: 48m
    # 根因：beat 以 PID 1 執行（exec），pidfile 會寫入「1」；若 pidfile 放在
    # 持久化的 celerybeat volume（/tmp），重啟後 celery 讀到舊 pidfile「1」，
    # 而每個容器都有 PID 1 → 判定「已在執行」而中止 → restart/autoheal 反覆
    # 拉起形成 CPU 爆掉的重啟迴圈（ERROR: Pidfile already exists ... pid: 1）。
    # 修法：pidfile 改放非持久化的 /dev/shm（每次啟動皆乾淨），schedule 仍持久化
    # 於 /tmp；啟動先 rm 掉新舊兩處殘留 pidfile 作保險。exec 讓 celery 接手 PID 1。
    command:
      - sh
      - -c
      - >
        rm -f /dev/shm/celerybeat.pid /tmp/celerybeat.pid &&
        exec python -m celery -A api.core.celery_app.celery_app beat
        --loglevel=INFO
        --scheduler celery.beat:PersistentScheduler
        --schedule=/tmp/celerybeat-schedule
        --pidfile=/dev/shm/celerybeat.pid
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      COOKIE_SECURE: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_SIZE: ${CELERY_BEAT_DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${CELERY_BEAT_DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      HEALTHCHECK_TIMEOUT_SECONDS: ${HEALTHCHECK_TIMEOUT_SECONDS:-2}
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/app/backups}
    volumes:
      - uploads:/app/uploads
      - celerybeat:/tmp
    healthcheck:
      test: ["CMD-SHELL", "test -f /dev/shm/celerybeat.pid && kill -0 \"$$(cat /dev/shm/celerybeat.pid)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/tedhuang6666/hcca_web_system-web:latest
    restart: unless-stopped
    # 記憶體護欄：吃到上限只 OOM-kill 自己（memswap=mem 即禁用 swap）。
    mem_limit: ${WEB_MEM_LIMIT:-768m}
    memswap_limit: ${WEB_MEM_LIMIT:-768m}
    mem_reservation: 192m
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://hcca40.hct.works}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  uploads:
  backups:
  celerybeat:
  caddydata:
  caddyconfig:
