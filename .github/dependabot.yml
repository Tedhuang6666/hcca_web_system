version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "01:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 3
    groups:
      python-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "01:30"
      timezone: Asia/Taipei
    open-pull-requests-limit: 3
    groups:
      web-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
