name: Build Docker Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/tedhuang6666/hcca_web_system-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/tedhuang6666/hcca_web_system-web

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: docker

      - name: 產生建置版本資訊
        id: version
        run: |
          version_base="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$version_base" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "VERSION 必須為 XX.XX.XX.XX，例如 01.00.00.00" >&2
            exit 1
          fi
          app_version="${version_base}.$(printf '%02d' "$(git rev-list --count "$GITHUB_SHA")")"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:${{ steps.version.outputs.app_version }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
            APP_VERSION=${{ steps.version.outputs.app_version }}
            BUILD_COMMIT=${{ steps.version.outputs.commit }}
            BUILD_REF=${{ steps.version.outputs.ref }}
            BUILD_TIME=${{ steps.version.outputs.built_at }}
            NEXT_PUBLIC_BUILD_COMMIT=${{ steps.version.outputs.commit }}
            NEXT_PUBLIC_BUILD_REF=${{ steps.version.outputs.ref }}
            NEXT_PUBLIC_BUILD_TIME=${{ steps.version.outputs.built_at }}
