name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --project apps/api

      - name: Run Ruff linter
        run: uv run --project apps/api ruff check apps/api/src libs/shared/src

      - name: Run Ruff formatter check
        run: uv run --project apps/api ruff format --check apps/api/src libs/shared/src

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_test
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:password@localhost:5432/campus_platform_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (with dev)
        run: uv sync --project apps/api

      - name: Run Pytest
        run: |
          uv run --project apps/api pytest apps/api/tests \
            --tb=short \
            -v \
            --asyncio-mode=auto
