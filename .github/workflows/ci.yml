name: CI — Lint, Types & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 官方 opt-in：讓所有 JS action 跑 Node 24，清掉 Node 20 棄用警告
#（2026-06-16 起 Node 24 將成預設）。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Ruff Lint & Mypy Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --project apps/api

      - name: Run Ruff linter
        run: uv run --project apps/api ruff check apps/api/src libs/shared/src

      - name: Run Ruff formatter check
        run: uv run --project apps/api ruff format --check apps/api/src libs/shared/src

      # 型別檢查 gate（漸進式採用）：範圍由 pyproject [tool.mypy] files 控制，
      # 清乾淨一個模組就加進清單，逐步擴大覆蓋面。
      - name: Run Mypy (type-check gate)
        run: uv run --project apps/api mypy

  test:
    name: Pytest + Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_test
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:password@localhost:5432/campus_platform_test
      # 注意：測試 fixture（conftest.py）以 TEST_DATABASE_URL 選 test DB，未設時用
      # sqlite in-memory。目前刻意維持 sqlite —— 改指 postgres 會掀出部分測試的外鍵
      # 資料設定 bug（如 shop_class 未先建 org，sqlite 不強制 FK 而矇混）。待那批
      # 測試修好後，再把 TEST_DATABASE_URL 指向上方 postgres service 以提升保真度。
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (with dev)
        run: uv sync --project apps/api

      # 覆蓋率門檻由 pyproject [tool.coverage.report] fail_under 控制（ratchet：補測試後逐步調高）。
      - name: Run Pytest with coverage
        run: |
          uv run --project apps/api pytest apps/api/tests \
            --tb=short \
            --asyncio-mode=auto \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  web:
    name: Web — Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check
