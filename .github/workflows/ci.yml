name: CI — Lint, Types & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint & Mypy Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --project apps/api

      - name: Run Ruff linter
        run: uv run --project apps/api ruff check apps/api/src libs/shared/src

      - name: Run Ruff formatter check
        run: uv run --project apps/api ruff format --check apps/api/src libs/shared/src

      # 型別檢查 gate（漸進式採用）：範圍由 pyproject [tool.mypy] files 控制，
      # 清乾淨一個模組就加進清單，逐步擴大覆蓋面。
      - name: Run Mypy (type-check gate)
        run: uv run --project apps/api mypy

  test:
    name: PostgreSQL Pytest + Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_test
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:password@localhost:5432/campus_platform_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_test
      REQUIRE_POSTGRES_TEST_DB: "true"
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (with dev)
        run: uv sync --project apps/api

      - name: Apply all database migrations
        run: uv run --project apps/api alembic upgrade head

      # 覆蓋率門檻由 pyproject [tool.coverage.report] fail_under 控制（ratchet：補測試後逐步調高）。
      - name: Run Pytest with coverage
        run: |
          uv run --project apps/api pytest apps/api/tests \
            --tb=short \
            --asyncio-mode=auto \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  schema:
    name: Alembic Schema Drift
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_platform_schema
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_schema
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:password@localhost:5432/campus_platform_schema
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --project apps/api

      - name: Upgrade database to head
        run: uv run --project apps/api alembic upgrade head

      - name: Verify models match migration head
        run: |
          before="$(find apps/api/alembic/versions -maxdepth 1 -type f -name '*.py' | sort)"
          uv run --project apps/api alembic revision --autogenerate -m ci_schema_drift
          after="$(find apps/api/alembic/versions -maxdepth 1 -type f -name '*.py' | sort)"
          generated="$(comm -13 <(printf '%s\n' "$before") <(printf '%s\n' "$after"))"
          if [ -z "$generated" ]; then
            echo "::error::Alembic did not create a drift-check revision"
            exit 1
          fi
          if ! grep -qE '^[[:space:]]+pass$' "$generated"; then
            echo "::error::SQLAlchemy models and Alembic head differ"
            sed -n '1,240p' "$generated"
            exit 1
          fi

  api-contract:
    name: OpenAPI Contract Drift
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: |
          uv sync --project apps/api
          npm ci --prefix apps/web
      - name: Regenerate OpenAPI types
        run: |
          uv run --project apps/api python apps/api/scripts/export_openapi.py openapi.json
          npm run --prefix apps/web generate:types
      - name: Verify generated contract is current
        run: git diff --exit-code -- apps/web/src/lib/api-types.ts

  security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Audit Python production dependencies
        run: |
          uv export --project apps/api --frozen --no-dev --no-emit-project \
            --format requirements-txt -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt
      - name: Audit frontend production dependencies
        run: |
          npm ci --prefix apps/web
          npm audit --prefix apps/web --omit=dev --audit-level=high

  performance-smoke:
    name: k6 Public API Smoke
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_platform_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/campus_platform_perf
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:password@localhost:5432/campus_platform_perf
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-characters-min

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install API dependencies
        run: uv sync --project apps/api
      - name: Prepare database
        run: uv run --project apps/api alembic upgrade head
      - name: Start API
        run: |
          uv run --project apps/api uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/ready && exit 0
            sleep 2
          done
          exit 1
      - name: Run k6 public smoke
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://127.0.0.1:8000 \
            -e VUS=2 \
            -e DURATION=10s \
            -v "$PWD:/workspace" \
            grafana/k6:latest run \
            --summary-export=/workspace/k6-summary.json \
            /workspace/scripts/load-test.js
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-public-smoke
          path: k6-summary.json
          if-no-files-found: ignore

  web:
    name: Web — Lint, Types & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: Unit tests with coverage
        run: npm test

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: next-build-output
          path: |
            apps/web/.next/build-manifest.json
            apps/web/.next/routes-manifest.json
          if-no-files-found: ignore

  web-e2e:
    name: Web — Playwright
    runs-on: ubuntu-latest
    needs: web
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public workflow tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
