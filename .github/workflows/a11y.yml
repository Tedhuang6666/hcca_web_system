# 無障礙（a11y）+ Lighthouse 自動掃描。對應 Phase C2 / docs/SLO.md。
#
# 條件：
# - PR 對 apps/web/** 有改動才跑（節省 minutes）
# - 對 push 到 main 也跑、收 baseline
#
# 工具：
# - @axe-core/cli：自動 a11y rules（WCAG 2.1 AA）
# - Lighthouse CI：performance / a11y / best-practices / seo
#
# 失敗條件（fail build）：
# - axe 任何 critical / serious 違反
# - Lighthouse a11y < 90 或 performance < 70

name: a11y

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/a11y.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/a11y.yml"

permissions:
  contents: read
  pull-requests: write

# GitHub 已棄用 Node 20 runtime（2026-06-16 起強制 Node 24）。先用官方 opt-in
# 旗標讓所有 JS action 直接跑 Node 24，免去逐一升級 action 版本的風險。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  axe:
    name: axe-core scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (production)
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"

      - name: Start Next.js (background)
        working-directory: apps/web
        run: |
          # next.config 設 output:standalone，因此「不能」用 `next start`
          #（會直接報錯退出）。改跑 standalone server，並手動補上 static / public
          # ——next build 不會自動把它們放進 .next/standalone。
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          HOSTNAME=127.0.0.1 PORT=3000 node .next/standalone/server.js &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              echo "Next.js is up"; exit 0;
            fi
            sleep 2
          done
          echo "::error::Next.js failed to start within 60s"; exit 1

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4.9

      - name: axe scan main routes
        run: |
          set -e
          axe http://127.0.0.1:3000/ \
              http://127.0.0.1:3000/legal/privacy \
              http://127.0.0.1:3000/legal/terms \
              http://127.0.0.1:3000/legal/accessibility \
            --exit \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa \
            --save axe-report.json
        continue-on-error: false

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.json
          retention-days: 30

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (production)
        working-directory: apps/web
        run: npm run build

      - name: Start Next.js (background)
        working-directory: apps/web
        run: |
          # 同 axe job：output:standalone 不能用 `next start`，改跑 standalone server。
          # treosh action 沒有可靠的 startServerCommand 輸入（原本的 START_SERVER_COMMAND
          # env 根本不會被讀），所以這裡自行把 server 拉起來，action 只負責對既有 URL 收數據。
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          HOSTNAME=127.0.0.1 PORT=3000 node .next/standalone/server.js &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              echo "Next.js is up"; exit 0;
            fi
            sleep 2
          done
          echo "::error::Next.js failed to start within 60s"; exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:3000/
            http://127.0.0.1:3000/legal/privacy
          configPath: ./.lighthouseci/config.json
          uploadArtifacts: true
          temporaryPublicStorage: true
