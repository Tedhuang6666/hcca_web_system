# 無障礙（a11y）+ Lighthouse 自動掃描。對應 Phase C2 / docs/SLO.md。
#
# 條件：
# - PR 對 apps/web/** 有改動才跑（節省 minutes）
# - 對 push 到 main 也跑、收 baseline
#
# 工具：
# - @axe-core/cli：自動 a11y rules（WCAG 2.1 AA）
# - Lighthouse CI：performance / a11y / best-practices / seo
#
# 失敗條件（fail build）：
# - axe 任何 critical / serious 違反
# - Lighthouse a11y < 90 或 performance < 70

name: a11y

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".lighthouseci/**"
      - ".github/workflows/a11y.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".lighthouseci/**"
      - ".github/workflows/a11y.yml"

permissions:
  contents: read

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: axe-core scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (production)
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"

      - name: Start Next.js (background)
        working-directory: apps/web
        run: |
          # next.config 設 output:standalone，因此「不能」用 `next start`
          #（會直接報錯退出）。改跑 standalone server，並手動補上 static / public
          # ——next build 不會自動把它們放進 .next/standalone。
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          HOSTNAME=127.0.0.1 PORT=3000 node .next/standalone/server.js > /tmp/next-server.log 2>&1 &
          NEXT_PID=$!
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ 2>/dev/null || echo "000")
            case "$STATUS" in
              2[0-9][0-9]|3[0-9][0-9]) echo "Next.js is up (HTTP $STATUS)"; exit 0 ;;
            esac
            if ! kill -0 "$NEXT_PID" 2>/dev/null; then
              echo "::error::Next.js server process died"; cat /tmp/next-server.log; exit 1
            fi
            echo "Waiting for Next.js... (attempt $i, HTTP $STATUS)"
            sleep 2
          done
          echo "::error::Next.js failed to start within 60s"
          cat /tmp/next-server.log
          exit 1

      - name: Install axe-core CLI + Chrome-matched ChromeDriver
        run: |
          set -e
          npm install -g @axe-core/cli@4.11.3
          # @axe-core/cli 內建的 chromedriver 版本會比 runner 上（會自動更新的）Chrome
          # 還新，造成 "session not created" → 退出碼 2。改裝一支對應已安裝 Chrome
          # 版本的 chromedriver（DETECT_CHROMEDRIVER_VERSION 會自動偵測），稍後用
          # --chromedriver-path 指給 axe，這樣不論 runner 的 Chrome 升到哪版都不會壞。
          DETECT_CHROMEDRIVER_VERSION=true npm install -g chromedriver
          google-chrome --version || true
          "$(npm root -g)/chromedriver/bin/chromedriver" --version || true

      - name: axe scan main routes
        run: |
          set -e
          axe http://127.0.0.1:3000/ \
              http://127.0.0.1:3000/legal/privacy \
              http://127.0.0.1:3000/legal/terms \
              http://127.0.0.1:3000/legal/accessibility \
            --chromedriver-path "$(npm root -g)/chromedriver/bin/chromedriver" \
            --chrome-options="no-sandbox,disable-setuid-sandbox,disable-dev-shm-usage" \
            --exit \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa \
            --save axe-report.json
        continue-on-error: false

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: axe-report
          path: axe-report.json
          retention-days: 30

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Lighthouse 13 支援 runner 的 Chrome 150，並要求 Node 22.19 以上。
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (production)
        working-directory: apps/web
        run: npm run build

      - name: Start Next.js (background)
        working-directory: apps/web
        run: |
          # 同 axe job：output:standalone 不能用 `next start`，改跑 standalone server。
          # Lighthouse CLI 不負責啟動網站，因此先自行啟動 standalone server。
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          HOSTNAME=127.0.0.1 PORT=3000 node .next/standalone/server.js > /tmp/next-server.log 2>&1 &
          NEXT_PID=$!
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ 2>/dev/null || echo "000")
            case "$STATUS" in
              2[0-9][0-9]|3[0-9][0-9]) echo "Next.js is up (HTTP $STATUS)"; exit 0 ;;
            esac
            if ! kill -0 "$NEXT_PID" 2>/dev/null; then
              echo "::error::Next.js server process died"; cat /tmp/next-server.log; exit 1
            fi
            echo "Waiting for Next.js... (attempt $i, HTTP $STATUS)"
            sleep 2
          done
          echo "::error::Next.js failed to start within 60s"
          cat /tmp/next-server.log
          exit 1

      - name: Run Lighthouse
        run: |
          mkdir -p .lighthouseci/reports
          for path in / /legal/privacy; do
            name=$(echo "$path" | tr '/' '-' | sed 's/^-//; s/-$//' | sed 's/^$/home/')
            for run in 1 2; do
              npx --yes lighthouse@13.4.0 "http://127.0.0.1:3000$path" \
                --config-path=.lighthouseci/config.json \
                --output=json \
                --output-path=".lighthouseci/reports/$name-$run.json" \
                --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu"
            done
          done

      - name: Validate Lighthouse thresholds
        run: |
          node --input-type=module <<'NODE'
          import { readdir, readFile } from "node:fs/promises";

          const thresholds = [
            [["categories", "performance", "score"], 0.7, "warn"],
            [["categories", "accessibility", "score"], 0.9, "error"],
            [["categories", "best-practices", "score"], 0.9, "warn"],
            [["categories", "seo", "score"], 0.9, "warn"],
            [["audits", "first-contentful-paint", "numericValue"], 2500, "warn", "max"],
            [["audits", "largest-contentful-paint", "numericValue"], 2500, "warn", "max"],
            [["audits", "cumulative-layout-shift", "numericValue"], 0.1, "error", "max"],
            [["audits", "total-blocking-time", "numericValue"], 300, "warn", "max"],
          ];
          const reports = await Promise.all(
            (await readdir(".lighthouseci/reports"))
              .filter((file) => file.endsWith(".json"))
              .map(async (file) => [file, JSON.parse(await readFile(`.lighthouseci/reports/${file}`, "utf8"))]),
          );
          let failed = false;
          for (const [file, report] of reports) {
            for (const [pathParts, limit, level, direction = "min"] of thresholds) {
              const value = pathParts.reduce((current, part) => current?.[part], report);
              const path = pathParts.join(".");
              const passed = direction === "min" ? value >= limit : value <= limit;
              const message = `${file}: ${path}=${value} (${direction} ${limit})`;
              if (passed) console.log(`PASS ${message}`);
              else if (level === "error") { console.error(`FAIL ${message}`); failed = true; }
              else console.warn(`WARN ${message}`);
            }
          }
          if (failed) process.exit(1);
          NODE

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: .lighthouseci/reports
          retention-days: 30
